name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |

          rsync -avz --delete \
            public/wp-content/themes/ \
            ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/var/www/html/wp-content/themes/

          rsync -avz --delete \
            public/wp-content/plugins/ \
            ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/var/www/html/wp-content/plugins/
